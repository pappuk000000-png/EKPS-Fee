          </div>
          <div style="overflow:auto; max-height:380px;"><table class="data"><thead><tr><th></th><th>ID</th><th>Photo</th><th>Class</th><th>Roll</th><th>Name</th><th>DOB</th></tr></thead><tbody>
            ${visible.length ? visible.map(s=>`<tr><td><input type="checkbox" data-admit-check="${s.id}" ${admitSelected[s.id]?'checked':''}/></td><td><span class="id-chip">${s.id}</span></td><td>${s.photoData?`<img class="photo-thumb" src="${s.photoData}"/>`:'-'}</td><td><span class="cls-chip">${esc(s.cls)}${s.section?' '+esc(s.section):''}</span></td><td>${esc(s.rollNo||'-')}</td><td style="font-weight:600;">${esc(s.name)}</td><td>${s.dob?fmtDate(s.dob):'-'}</td></tr>`).join('') : '<tr><td colspan="7"><div class="empty-state">Koi student nahi mila</div></td></tr>'}
          </tbody></table></div>
          <div class="admit-selected-list">${selected.length ? selected.slice(0,24).map(s=>`<span class="admit-pill">${esc(s.name)} (${esc(s.cls)})</span>`).join('') + (selected.length>24?`<span class="admit-pill">+${selected.length-24} more</span>`:'') : '<span class="hint">No student selected</span>'}</div>
        </div>
      </div>
      <div class="panel" style="margin-top:16px;">
        <div class="panel-head"><h3>Live Preview</h3><span class="hint">${selected.length} selected &middot; print me A4 par 4 cards per page</span></div>
        <div class="panel-body">
          ${selected.length ? `<div class="admit-preview-grid">${selected.slice(0,4).map(s=>admitPreviewCard(s, exam)).join('')}</div>${selected.length>4?`<div class="hint" style="margin-top:10px;">Aur ${selected.length-4} admit cards print me include honge.</div>`:''}` : '<div class="empty-state" style="padding:22px;">Preview ke liye student select karein</div>'}
        </div>
      </div>
      <div id="ekps-admit-print">${selected.length && exam ? admitPrintPages(selected, exam) : ''}</div>`;

    document.getElementById('save-school-settings').addEventListener('click', async ()=>{
      schoolSettings.schoolName = document.getElementById('set-school').value.trim() || 'Education Key Public School';
      schoolSettings.address = document.getElementById('set-address').value.trim();
      schoolSettings.phone = document.getElementById('set-phone').value.trim();
      schoolSettings.principalName = document.getElementById('set-principal').value.trim() || 'Principal';
      schoolSettings.instructions = document.getElementById('set-instructions').value.trim();
      const logo = document.getElementById('set-logo').files[0];
      const sign = document.getElementById('set-sign').files[0];
      try {
        if(logo) schoolSettings.logoData = await readResizedImage(logo, 260);
        if(sign) schoolSettings.signatureData = await readResizedImage(sign, 360);
      } catch(err){ toast('Image upload nahi ho payi'); return; }
      saveSettings(); toast('School settings saved'); renderAdmitCards();
    });
    document.getElementById('save-exam').addEventListener('click', ()=>{
      const name = document.getElementById('exam-name').value.trim();
      const fromDate = document.getElementById('exam-from').value;
      const toDate = document.getElementById('exam-to').value;
      if(!name || !fromDate || !toDate){ toast('Exam name aur date daalein'); return; }
      if(admitEditingExamId){ exams = exams.map(e=>e.id===admitEditingExamId ? {...e, name, fromDate, toDate} : e); admitEditingExamId = null; }
      else { const rec = {id:nextExamId(), name, fromDate, toDate}; exams.push(rec); admitFilters.examId = String(rec.id); }
      saveExams(); toast('Exam saved'); renderAdmitCards();
    });
    const cancelExam = document.getElementById('cancel-exam-edit');
    if(cancelExam) cancelExam.addEventListener('click', ()=>{ admitEditingExamId=null; renderAdmitCards(); });
    contentEl.querySelectorAll('[data-edit-exam]').forEach(el=>el.addEventListener('click', ()=>{ admitEditingExamId=parseInt(el.dataset.editExam); renderAdmitCards(); }));
    contentEl.querySelectorAll('[data-del-exam]').forEach(el=>el.addEventListener('click', ()=>{ if(!confirm('Ye exam delete karein?')) return; const id=parseInt(el.dataset.delExam); exams=exams.filter(e=>e.id!==id); if(String(admitFilters.examId)===String(id)) admitFilters.examId=''; saveExams(); toast('Exam deleted'); renderAdmitCards(); }));
    document.getElementById('admit-exam-select').addEventListener('change', e=>{ admitFilters.examId=e.target.value; renderAdmitCards(); });
    document.getElementById('admit-class-select').addEventListener('change', e=>{ admitFilters.cls=e.target.value; renderAdmitCards(); });
    document.getElementById('admit-search').addEventListener('input', e=>{ admitFilters.q=e.target.value; renderAdmitCards(); });
    document.getElementById('select-visible').addEventListener('click', ()=>{ visible.forEach(s=>admitSelected[s.id]=true); renderAdmitCards(); });
    document.getElementById('clear-selection').addEventListener('click', ()=>{ admitSelected={}; renderAdmitCards(); });
    document.getElementById('print-class-admit').addEventListener('click', ()=>{ if(!exam || !visible.length) return; admitSelected={}; visible.forEach(s=>admitSelected[s.id]=true); renderAdmitCards(); setTimeout(()=>window.print(), 80); });
    document.getElementById('print-selected-admit').addEventListener('click', ()=>{ if(selected.length && exam) window.print(); });
    contentEl.querySelectorAll('[data-admit-check]').forEach(el=>el.addEventListener('change', ()=>{ const id=parseInt(el.dataset.admitCheck); if(el.checked) admitSelected[id]=true; else delete admitSelected[id]; renderAdmitCards(); }));
  }

  /* ---------- RECEIPTS ---------- */
  function receiptBodyHTML(sel, s, netRest){
    return `
      <div class="receipt-top">
        <div>
          <div class="receipt-school">Education Key<br/>Public School</div>
          <div class="receipt-school-sub">Fees Payment Receipt</div>
        </div>
        <div class="receipt-no">${sel.receiptNo}</div>
      </div>
      <div class="receipt-row"><span class="k">Student Name</span><span class="v">${esc(s.name)}</span></div>
      <div class="receipt-row"><span class="k">Class</span><span class="v">${esc(s.cls)}</span></div>
      <div class="receipt-row"><span class="k">Paid For Month</span><span class="v">${esc(sel.month)}</span></div>
      <div class="receipt-row"><span class="k">Payment Date</span><span class="v">${fmtDate(sel.date)}</span></div>
      <div class="receipt-amt-block">
        <div class="receipt-amt-label">Amount Received</div>
        <div class="receipt-amt">${fmt(sel.amount)}</div>
      </div>
      <div class="receipt-row"><span class="k">Net Outstanding Due</span><span class="v">${fmt(netRest)}</span></div>
      <div class="receipt-foot">
        <span>Issued: ${fmtDate(todayISO())}</span>
        <span class="receipt-sign">Principal / Accounts</span>
      </div>`;
  }

  function renderReceipts(){
    const sorted = entries.slice().sort((a,b)=> b.id-a.id);
    if (receiptSelectedId==null && sorted.length) receiptSelectedId = sorted[0].id;
    const sel = entries.find(e=>e.id===receiptSelectedId);
    const s = sel ? students.find(x=>x.id===sel.studentId) : null;
    const netRest = s ? totalDue(s)-totalPaid(s.id) : 0;
    const body = (sel && s) ? receiptBodyHTML(sel, s, netRest) : '';

    contentEl.innerHTML = `
      <div class="receipt-picker">
        <div class="field" style="min-width:280px;">
          <label>Select Receipt</label>
          <select id="ekps-receipt-select">
            ${sorted.length ? sorted.map(e=>{
              const st = students.find(x=>x.id===e.studentId);
              return `<option value="${e.id}" ${e.id===receiptSelectedId?'selected':''}>${e.receiptNo} — ${esc(st?st.name:'—')} (${e.month})</option>`;
            }).join('') : `<option>Koi receipt nahi</option>`}
          </select>
        </div>
        <span class="btn btn-primary" id="ekps-print-btn" ${sel?'':'disabled'}>${ICONS.print} Print Receipt (Half A4)</span>
      </div>
      <div class="receipt-wrap">
        ${sel && s ? `
        <div class="receipt" id="ekps-print-area">
          ${body}
          <div class="receipt-perf"></div>
        </div>
        <div style="width:380px; text-align:center; margin-top:8px; font-size:11px; color:var(--slate);">Print par A4 sheet ke upar wale hisse (top half) mein Student Copy aur Office Copy side-by-side banegi — neeche ka hissa blank rahega.</div>
        ` : `<div class="empty-state">Pehle Fee Collection tab se ek entry banayein.</div>`}
      </div>
      <div id="ekps-print-dual">
        ${sel && s ? `
        <div class="top-half">
          <div class="copy-col">
            <div class="copy-tag">Student Copy</div>
            ${body}
          </div>
          <div class="copy-col second">
            <div class="copy-tag">Office Copy</div>
            ${body}
          </div>
        </div>
        <div class="bottom-half"></div>` : ''}
      </div>`;

    const sel1 = document.getElementById('ekps-receipt-select');
    if (sel1) sel1.addEventListener('change', e=>{ receiptSelectedId = parseInt(e.target.value); renderReceipts(); });
    const pbtn = document.getElementById('ekps-print-btn');
    if (pbtn) pbtn.addEventListener('click', ()=> window.print());
  }

  /* ---------- BACKUP & RESTORE ---------- */
  function renderBackup(){
    const sorted = autoBackups.slice().sort((a,b)=> b.ts - a.ts);
    const lastTs = sorted.length ? sorted[0].ts : null;
    const fmtWhen = (ts)=> new Date(ts).toLocaleString('en-IN', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
    const maskGasUrl = (u)=>{
      if (!u) return '';
      if (u.length <= 46) return u.slice(0,10) + '••••••••' + u.slice(-6);
      return u.slice(0,38) + '••••••••••••' + u.slice(-14);
    };

    contentEl.innerHTML = `
      <div class="kpi-card" style="margin-bottom:18px; --accent:var(--green);">
        <div class="kpi-label">Auto-Backup Status</div>
        <div class="kpi-value" style="font-size:17px;">${lastTs ? fmtWhen(lastTs) : 'Abhi tak koi auto-backup nahi hua'}</div>
        <div class="kpi-note">Har save ke baad (max 3 min me ek baar) apne aap ek snapshot ban jata hai &middot; last ${AUTO_BACKUP_KEEP} snapshots surakshit rehte hain</div>
      </div>
      <div class="panel" style="margin-bottom:16px;">
        <div class="panel-head">
          <h3>${ICONS.backup} Google Sheets Sync (Remote)</h3>
          <span class="mono" style="font-size:11px; color:${lastGasSync ? (lastGasSync.status==='ok' ? 'var(--green)' : 'var(--rust)') : 'var(--slate)'};">
            ${gasBusy ? 'Syncing…' : (lastGasSync ? (lastGasSync.status==='ok' ? '● Connected — ' + fmtWhen(lastGasSync.ts) : '● Error — ' + fmtWhen(lastGasSync.ts)) : '○ Not synced yet')}
          </span>
        </div>
        <div class="panel-body">
          <p style="font-size:13px; color:var(--slate); margin:0 0 14px 0; line-height:1.6;">
            Ye feature localStorage ke data ko ek Google Apps Script (GAS) bridge ke through ek external Google Sheet ke sath sync karta hai —
            taaki data sirf is browser tak simit na rahe. Setup ke liye pehle neeche diya gaya Apps Script code apne Google Sheet me paste karein,
            "Web App" ke roop me deploy karein (Access: <span class="mono">Anyone</span>), aur uska URL yahan neeche paste karke save karein.
          </p>
          <div class="form-grid" style="grid-template-columns: 1fr; margin-bottom:0;">
            <div class="field">
              <label>Apps Script Web App URL ${gasUrlLocked ? '🔒 Locked' : '🔓 Unlocked — editing'}</label>
              ${gasUrlLocked ? `
                <input type="text" id="ekps-gas-url" value="${esc(maskGasUrl(gasUrl))}" disabled
                  style="background:#F2F0E7; color:var(--slate); cursor:not-allowed;"/>
                <span class="hint">URL lock hai taaki galti se change/delete na ho. Change karne ke liye "Unlock" dabayein.</span>
              ` : `
                <input type="text" id="ekps-gas-url" placeholder="https://script.google.com/macros/s/XXXXXXXX/exec" value="${esc(gasUrl)}"/>
                <span class="hint">Apps Script editor me Deploy &rarr; New deployment &rarr; Web app se ye URL milega.</span>
              `}
            </div>
          </div>
          <div style="display:flex; align-items:center; gap:10px; margin: 2px 0 16px 0; flex-wrap:wrap;">
            ${gasUrlLocked
              ? `<span class="btn btn-ghost btn-sm" id="ekps-gas-unlock">🔓 Unlock to Edit</span>`
              : `<span class="btn btn-ghost btn-sm" id="ekps-gas-save-url">Save URL</span>
                 <span class="btn btn-ghost btn-sm" id="ekps-gas-lock">🔒 Lock</span>`
            }
            <label style="display:flex; align-items:center; gap:7px; font-size:12.5px; color:var(--slate); cursor:pointer; user-select:none;">
              <input type="checkbox" id="ekps-gas-autosync" ${gasAutoSync ? 'checked' : ''} style="width:15px; height:15px; accent-color:var(--saffron);"/>
              Har save ke baad auto-sync Google Sheet par karein
            </label>
          </div>
          ${lastGasSync && lastGasSync.status==='error' ? `<div class="pick-preview" style="display:block; border-color:#EAD0C6; background:var(--rust-bg); color:var(--rust);">Last error: ${esc(lastGasSync.message)}</div>` : ''}
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <span class="btn btn-accent" id="ekps-gas-push" style="${(gasBusy||!gasUrl)?'opacity:.5; pointer-events:none;':''}">⬆ Upload to Sheet (Sync Now)</span>
            <span class="btn btn-danger" id="ekps-gas-pull" style="${(gasBusy||!gasUrl)?'opacity:.5; pointer-events:none;':''} border-color:#EAD0C6; background:var(--rust-bg);">⬇ Download from Sheet (Restore)</span>
          </div>
        </div>
      </div>
      <div class="two-col">
        <div class="panel">
          <div class="panel-head"><h3>Auto Backups (Restore Point)</h3>
            <span class="btn btn-ghost btn-sm" id="ekps-backup-now">Backup Now</span></div>
          <div class="panel-body" id="ekps-autobackup-list">
            ${sorted.length ? sorted.map(b=>`
              <div class="recent-row">
                <div><div class="recent-name">${fmtWhen(b.ts)}</div>
                <div class="recent-meta">${b.students.length} students &middot; ${b.entries.length} entries &middot; ${(b.exams||[]).length} exams</div></div>
                <span class="btn btn-ghost btn-sm" data-restore-auto="${b.ts}">Restore</span>
              </div>`).join('') : `<div class="empty-state">Koi auto-backup abhi nahi bana. Kuch save karein ya "Backup Now" dabayein.</div>`}
          </div>
        </div>
        <div class="panel">
          <div class="panel-head"><h3>Download Backup</h3></div>
          <div class="panel-body">
            <p style="font-size:13px; color:var(--slate); margin:0 0 14px 0; line-height:1.6;">
              Sabhi students, unke fees/bills, payment entries, school settings aur exams ek single <span class="mono">.json</span> file me save ho jayenge.
              Ye file kahin bhi (pendrive, email, Google Drive) surakshit rakhein — kabhi bhi data restore karne ke kaam aayegi.
            </p>
            <div class="kpi-card" style="margin-bottom:16px;">
              <div class="kpi-label">Current Data</div>
              <div class="kpi-value" style="font-size:19px;">${students.length} Students &middot; ${entries.length} Entries</div>
              <div class="kpi-note">Backup me students, entries, school settings aur exams shamil honge</div>
            </div>
            <span class="btn btn-accent" id="ekps-backup-download">⬇ Download Backup (.json)</span>
          </div>
        </div>
      </div>
      <div class="panel" style="margin-top:16px;">
        <div class="panel-head"><h3>Restore From Backup File</h3></div>
        <div class="panel-body">
          <p style="font-size:13px; color:var(--slate); margin:0 0 14px 0; line-height:1.6;">
            Pehle se downloaded backup <span class="mono">.json</span> file yahan select karein. <b style="color:var(--rust);">Dhyan rahe:</b> restore karne se maujooda saara data (students + entries) is file ke data se replace ho jayega.
          </p>
          <div class="field">
            <label>Select Backup File</label>
            <input type="file" id="ekps-restore-file" accept="application/json,.json"/>
          </div>
          <span class="btn btn-danger" id="ekps-restore-btn" style="border-color:var(--rust); background:var(--rust-bg);">⬆ Restore Data</span>
        </div>
      </div>`;

    const gasSaveBtn = document.getElementById('ekps-gas-save-url');
    if (gasSaveBtn) gasSaveBtn.addEventListener('click', () => {
      const val = document.getElementById('ekps-gas-url').value.trim();
      gasUrl = val;
      saveGasSettings();
      toast(gasUrl ? 'Web App URL save ho gaya' : 'URL clear kar diya gaya');
      renderBackup();
    });
    const gasUnlockBtn = document.getElementById('ekps-gas-unlock');
    if (gasUnlockBtn) gasUnlockBtn.addEventListener('click', () => {
      if (!confirm('Web App URL unlock karein? Galti se edit/delete hone se sync tootne ka risk hai.')) return;
      gasUrlLocked = false;
      saveGasSettings();
      renderBackup();
    });
    const gasLockBtn = document.getElementById('ekps-gas-lock');
    if (gasLockBtn) gasLockBtn.addEventListener('click', () => {
      gasUrlLocked = true;
      saveGasSettings();
      toast('URL lock kar diya gaya');
      renderBackup();
    });
    document.getElementById('ekps-gas-autosync').addEventListener('change', (e) => {
      gasAutoSync = e.target.checked;
      saveGasSettings();
      toast(gasAutoSync ? 'Auto-sync ON kar diya' : 'Auto-sync OFF kar diya');
    });
    document.getElementById('ekps-gas-push').addEventListener('click', () => {
      if (!gasUrl) { toast('Pehle Apps Script Web App URL save karein'); return; }
      pushToSheet(false);
    });
    document.getElementById('ekps-gas-pull').addEventListener('click', () => {
      if (!gasUrl) { toast('Pehle Apps Script Web App URL save karein'); return; }
      pullFromSheet();
    });

    document.getElementById('ekps-backup-now').addEventListener('click', () => {
      snapshotNow();
      toast('Backup snapshot ban gaya');
      renderBackup();
    });

    contentEl.querySelectorAll('[data-restore-auto]').forEach(el=>{
      el.addEventListener('click', () => {
        const ts = parseFloat(el.dataset.restoreAuto);
        const snap = autoBackups.find(b=>b.ts===ts);
        if (!snap) return;
        if (!confirm(`Is ${fmtWhen(ts)} wale snapshot par restore karein? Isse maujooda ${students.length} students aur ${entries.length} entries hat jayengi, aur snapshot ke ${snap.students.length} students / ${snap.entries.length} entries aa jayengi.`)) return;
        students = JSON.parse(JSON.stringify(snap.students));
        entries = JSON.parse(JSON.stringify(snap.entries));
        schoolSettings = {...schoolSettings, ...(snap.settings || {})};
        exams = JSON.parse(JSON.stringify(snap.exams || []));
        students.forEach(normalizeStudent);
        saveStudents();
        saveEntries();
        saveSettings();
        saveExams();
        toast('Auto-backup se restore ho gaya');
        renderBackup();
      });
    });

    document.getElementById('ekps-backup-download').addEventListener('click', ()=>{
      const payload = {
        app: 'Education Key Public School — Fee Manager',
        exportedAt: new Date().toISOString(),
        students,
        entries,
        settings: schoolSettings,
        exams
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `EKPS_Backup_${todayISO()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      toast('Backup download ho rahi hai');
    });

    document.getElementById('ekps-restore-btn').addEventListener('click', ()=>{
      const fileInput = document.getElementById('ekps-restore-file');
      const file = fileInput.files && fileInput.files[0];
      if (!file) { toast('Pehle ek backup file select karein'); return; }
      const reader = new FileReader();
      reader.onload = (ev)=>{
        try {
          const data = JSON.parse(ev.target.result);
          if (!data.students || !data.entries) {
            toast('Ye file valid backup nahi hai');
            return;
          }
          if (!confirm(`Restore karein? Isse maujooda ${students.length} students aur ${entries.length} entries hat jayengi, aur backup ke ${data.students.length} students / ${data.entries.length} entries aa jayengi.`)) return;
          data.students.forEach(normalizeStudent);
          students = data.students;
          entries = data.entries;
          schoolSettings = {...schoolSettings, ...(data.settings || data.schoolSettings || {})};
          exams = Array.isArray(data.exams) ? data.exams : [];
          saveStudents();
          saveEntries();
          saveSettings();
          saveExams();
          toast('Data restore ho gaya');
          renderBackup();
        } catch(err){
          toast('File padhne me error — sahi .json file chunein');
        }
      };
      reader.readAsText(file);
    });
  }

  document.getElementById('ekps-logout-btn').addEventListener('click', () => {
    currentUserRole = null;
    localStorage.removeItem('ekps_session');
    toast('Logged out successfully');
    render();
  });

  function render(){
    if (!ready) { contentEl.innerHTML = `<div class="empty-state">Loading&hellip;</div>`; return; }
    
    if(!currentUserRole) {
      const badge0 = document.getElementById('ekps-gas-badge');
      if (badge0) badge0.style.display = 'none';
      renderLoginView();
      return;
    }

    const activeRouteConfig = NAV.find(n => n.id === route);
    if(activeRouteConfig && !activeRouteConfig.roles.includes(currentUserRole)){
      route = 'dashboard'; 
    }

    document.getElementById('ekps-logout-btn').style.display = 'inline-block';
    const rb = document.getElementById('ekps-role-badge');
    rb.style.display = 'inline-block';
    rb.textContent = currentUserRole;
    renderGasStatusBadge();
    maybeShowGasSyncIssueModal();
    
    renderNav();
    titleEl.textContent = TITLES[route][0];
    subEl.textContent = TITLES[route][1];
    
    if (route==='dashboard') renderDashboard();
    else if (route==='collect') renderCollect();
    else if (route==='students') renderStudents();
    else if (route==='feemanage') renderFeeManagement(); 
    else if (route==='promotion') renderPromotion();
    else if (route==='admit') renderAdmitCards();
    else if (route==='ledger') renderLedger();
    else if (route==='receipts') renderReceipts();
    else if (route==='backup') renderBackup();
  }

  function tickClock(){
    const el = document.getElementById('ekps-clock');
    if (el) el.textContent = new Date().toLocaleString('en-IN', {weekday:'short', day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
  }
  setInterval(tickClock, 1000*30);
  tickClock();

  loadData();
  render();
})();
</script>
</body>
</html>
